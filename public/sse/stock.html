<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Real-time Stock Chart</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>
  <h2>Live Stock Price Chart</h2>
  <canvas id="stockChart"></canvas>

  <script>
    // Initialize Chart.js
    const ctx = document.getElementById('stockChart').getContext('2d');
    const chartData = {
      labels: [],
      datasets: [{
        label: 'Stock Price (USD)',
        borderColor: 'green',
        borderWidth: 2,
        fill: false,
        data: []
      }]
    };

    const myChart = new Chart(ctx, {
      type: 'line',
      data: chartData,
      options: {
        responsive: true,
        scales: {
          x: { title: { display: true, text: 'Time' } },
          y: { title: { display: true, text: 'Price (USD)' }, suggestedMin: 90, suggestedMax: 110 }
        }
      }
    });

    // Connect to SSE
    const eventSource = new EventSource('/sse/stock-stream');

    eventSource.onmessage = function (event) {
      const newData = JSON.parse(event.data);
      chartData.labels.push(new Date(newData.time).toLocaleTimeString());
      chartData.datasets[0].data.push(newData.price);

      // Keep only last 20 points for smoothness
      if (chartData.labels.length > 20) {
        chartData.labels.shift();
        chartData.datasets[0].data.shift();
      }

      myChart.update();
    };

    eventSource.onerror = function () {
      console.error("SSE connection lost. Retrying...");
    };
  </script>
</body>

</html>
